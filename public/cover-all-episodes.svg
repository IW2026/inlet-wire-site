<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1500" width="1500" height="1500">
  <rect width="1500" height="1500" fill="#FFFFFF"/>

  <!-- Ghosted curve motif (large, faded) -->
  <g stroke="#E8E8E8" stroke-width="14" fill="none" stroke-linecap="round">
    <path d="M -200 900 C 200 200, 600 200, 800 900 S 1400 1600, 1700 900" />
    <path d="M -100 1000 C 300 300, 700 300, 900 1000 S 1500 1700, 1800 1000" opacity="0.55" />
  </g>

  <!-- Logo: three thin peaks -->
  <g transform="translate(360, 400)" stroke="#0A0A0A" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 0 260 C 120 260, 180 0, 300 130 C 360 190, 420 190, 480 130 C 600 0, 660 260, 780 260" />
    <path d="M 60 260 C 180 260, 240 60, 360 170 C 420 220, 480 220, 540 170 C 660 60, 720 260, 840 260" opacity="0.95" />
    <path d="M -60 260 C 60 260, 120 60, 240 170 C 300 220, 360 220, 420 170 C 540 60, 600 260, 720 260" opacity="0.95" />
  </g>

  <!-- INLET WIRE wordmark -->
  <text x="750" y="870"
        font-family="Montserrat, system-ui, sans-serif"
        font-weight="900"
        font-size="210"
        letter-spacing="-4"
        text-anchor="middle"
        fill="#0A0A0A">INLET WIRE</text>

  <!-- Subtitle -->
  <text x="750" y="1040"
        font-family="Montserrat, system-ui, sans-serif"
        font-weight="900"
        font-size="130"
        letter-spacing="-2"
        text-anchor="middle"
        fill="#0A0A0A">ALL EPISODES</text>
</svg>
