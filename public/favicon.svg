<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#0A0A0A"/>
  <!-- Baseline -->
  <line x1="2" y1="22" x2="30" y2="22" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Three-peak curve traced from logo.png pixel data.
       Key points: left peak (9,12), valley (12,17), center peak (16,3),
       valley (20,16), right peak (23,12). G1-smooth at every junction. -->
  <path d="M 2,22
    C 4,21 7.5,12 9,12
    C 10.5,12 11.5,17 12,17
    C 12.5,17 14.5,3 16,3
    C 17.5,3 19.5,16 20,16
    C 20.5,16 22.5,12 23,12
    C 23.5,12 28,21 30,22"
    fill="none" stroke="#FFFFFF" stroke-width="1.3"
    stroke-linecap="round" stroke-linejoin="round"/>
</svg>
