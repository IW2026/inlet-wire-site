<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <rect width="32" height="32" fill="#0A0A0A"/>
  <!-- Three smooth peaks matching the Inlet Wire logo mark -->
  <!-- Baseline -->
  <line x1="2" y1="22" x2="30" y2="22" stroke="#FFFFFF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Left peak -->
  <path d="M2,22 C4,22 5,18 7.5,13 C10,18 11,22 13,22" fill="none" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Centre peak (tallest) -->
  <path d="M10,22 C12,22 13.5,16 16,7 C18.5,16 20,22 22,22" fill="none" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right peak -->
  <path d="M19,22 C21,22 22,18 24.5,13 C27,18 28,22 30,22" fill="none" stroke="#FFFFFF" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
